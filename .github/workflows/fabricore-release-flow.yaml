name: Fabricore Release Flow

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "fabricore-os/**"
      - "fabric-core/**"
      - ".github/workflows/fabricore-release-flow.yaml"
  push:
    tags:
      - "v*"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  java-gate:
    name: Java artifact gate
    runs-on: ubuntu-latest
    outputs:
      artifact-name: fabricore-java-release-flow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Java Fabricore
        run: |
          chmod +x fabricore-os/build-java.sh
          ./fabricore-os/build-java.sh

      - name: Verify Java contract
        run: |
          shasum -a 256 -c dist/fabricore.jar.sha256
          java -jar dist/fabricore.jar contract

      - name: Upload Java gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabricore-java-release-flow
          path: |
            dist/fabricore.jar
            dist/fabricore.jar.sha256
          if-no-files-found: error

  dmg-gate:
    name: Mac DMG gate
    needs: java-gate
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Apple Silicon runner
        run: |
          set -euo pipefail
          test "$(uname -s)" = "Darwin"
          test "$(uname -m)" = "arm64"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build Java Fabricore
        run: |
          chmod +x fabricore-os/build-java.sh
          ./fabricore-os/build-java.sh

      - name: Build fabric.dmg through Java operator
        run: |
          java -jar dist/fabricore.jar build dmg

      - name: Verify fabric.dmg checksum
        run: |
          test -f fabric.dmg
          test -f fabric.dmg.sha256
          shasum -a 256 -c fabric.dmg.sha256

      - name: Upload DMG gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabric-dmg-release-flow
          path: |
            fabric.dmg
            fabric.dmg.sha256
          if-no-files-found: error

  release-handover:
    name: Release gate handover
    needs:
      - java-gate
      - dmg-gate
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Comment release gate status
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const javaStatus = '${{ needs.java-gate.result }}';
            const dmgStatus = '${{ needs.dmg-gate.result }}';
            const sha = context.sha.substring(0, 7);
            const passed = javaStatus === 'success' && dmgStatus === 'success';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 2,
              body: [
                `Fabricore release flow handover for commit \`${sha}\`.`,
                ``,
                `Java artifact gate: **${javaStatus}**`,
                `Mac DMG gate: **${dmgStatus}**`,
                `Release gate: **${passed ? 'READY FOR AUTHOR REVIEW' : 'BLOCKED - REPAIR LOOP REQUIRED'}**`
              ].join('\n')
            });

      - name: Comment PR gate status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const javaStatus = '${{ needs.java-gate.result }}';
            const dmgStatus = '${{ needs.dmg-gate.result }}';
            const passed = javaStatus === 'success' && dmgStatus === 'success';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `Fabricore PR release gate completed.`,
                ``,
                `Java artifact gate: **${javaStatus}**`,
                `Mac DMG gate: **${dmgStatus}**`,
                `PR gate: **${passed ? 'PASS' : 'BLOCKED'}**`
              ].join('\n')
            });

      - name: Attach release assets on tag
        if: startsWith(github.ref, 'refs/tags/') && needs.java-gate.result == 'success' && needs.dmg-gate.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fabricore.jar
            dist/fabricore.jar.sha256
            fabric.dmg
            fabric.dmg.sha256

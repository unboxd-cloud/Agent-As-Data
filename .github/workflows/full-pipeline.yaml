name: Full Agent-as-Data Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  self-check:
    name: Repository Self Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run self-check
        run: chmod +x scripts/self-check.sh && scripts/self-check.sh

  docker-build:
    name: Docker Build Gate
    runs-on: ubuntu-latest
    needs: self-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Java Reconciler Image
        run: docker build -t agent-as-data-reconciler-java:ci operator-java

  pages-build:
    name: Pages Build Gate
    runs-on: ubuntu-latest
    needs: self-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Fabric Control Pane
        run: cd fabric-browser-mac && npm install && npm run build

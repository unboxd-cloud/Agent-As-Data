name: Fabricore Java Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-java:
    name: Build Java Fabricore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Java artifact
        run: |
          chmod +x fabricore-os/build-java.sh
          ./fabricore-os/build-java.sh

      - name: Verify Java artifact
        run: |
          test -f dist/fabricore.jar
          test -f dist/fabricore.jar.sha256
          shasum -a 256 -c dist/fabricore.jar.sha256
          java -jar dist/fabricore.jar contract

      - name: Upload Java artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fabricore-java
          path: |
            dist/fabricore.jar
            dist/fabricore.jar.sha256
          if-no-files-found: error

      - name: Attach Java artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fabricore.jar
            dist/fabricore.jar.sha256

apiVersion: v1
kind: Namespace
metadata:
  name: fabric
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: fabric
  labels:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: agent-as-data
spec:
  selector:
    app.kubernetes.io/name: surrealdb
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
  namespace: fabric
  labels:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: agent-as-data
spec:
  serviceName: surrealdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: surrealdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: surrealdb
        app.kubernetes.io/part-of: agent-as-data
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:latest
          imagePullPolicy: IfNotPresent
          args:
            - start
            - --user
            - root
            - --pass
            - ChangeMeNow
            - rocksdb:/data
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi

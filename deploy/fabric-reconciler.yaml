apiVersion: v1
kind: ServiceAccount
metadata:
  name: fabric-reconciler
  namespace: fabric
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fabric-reconciler
rules:
  - apiGroups:
      - fabric.agennext.io
    resources:
      - agents
      - agents/status
    verbs:
      - get
      - list
      - watch
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fabric-reconciler
subjects:
  - kind: ServiceAccount
    name: fabric-reconciler
    namespace: fabric
roleRef:
  kind: ClusterRole
  name: fabric-reconciler
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabric-reconciler
  namespace: fabric
  labels:
    app.kubernetes.io/name: fabric-reconciler
    app.kubernetes.io/part-of: agent-as-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fabric-reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fabric-reconciler
        app.kubernetes.io/part-of: agent-as-data
    spec:
      serviceAccountName: fabric-reconciler
      containers:
        - name: reconciler
          image: ghcr.io/unboxd-cloud/agent-as-data-reconciler:latest
          imagePullPolicy: Always
          env:
            - name: SURREAL_ENDPOINT
              value: ws://surrealdb.fabric.svc.cluster.local:8000
            - name: SURREAL_USER
              value: root
            - name: SURREAL_PASS
              value: ChangeMeNow
            - name: SURREAL_NS
              value: agennext
            - name: SURREAL_DB
              value: fabric

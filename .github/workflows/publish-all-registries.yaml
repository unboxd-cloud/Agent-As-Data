name: Publish All Registries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  publish-ghcr:
    name: Publish Reconciler OCI Image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/unboxd-cloud/agent-as-data-reconciler-java
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha

      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: operator-java
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-maven:
    name: Publish Java Artifacts to GitHub Maven Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Publish Java Reconciler Package
        run: mvn -B -DskipTests deploy -s $GITHUB_WORKSPACE/settings.xml
        working-directory: operator-java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Java SDK Package
        run: mvn -B -DskipTests deploy -s $GITHUB_WORKSPACE/settings.xml
        working-directory: sdk-java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish TypeScript SDK to GitHub npm Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com
          scope: '@unboxd'

      - name: Build TypeScript SDK
        run: cd sdk-typescript && npm install && npm run check

      - name: Publish TypeScript SDK
        run: npm publish
        working-directory: sdk-typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pages:
    name: Publish Fabric Control Pane to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Control Pane
        run: cd fabric-browser-mac && npm install && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fabric-browser-mac/dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release-artifacts:
    name: Publish Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package contracts
        run: tar -czf agent-as-data-contracts.tar.gz contracts policies crds samples docs

      - name: Package Mac build pack
        run: tar -czf agent-as-data-mac-silicon-buildpack.tar.gz install.sh buildpacks fabric-metal-core fabric-mac-core fabric-browser-mac

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            agent-as-data-contracts.tar.gz
            agent-as-data-mac-silicon-buildpack.tar.gz
